name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Cancel superseded runs on the same ref — but never cancel a tag (release) run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history so the version-bump check can read the previous commit

    # Fail fast (before installing anything) if an update to main forgot to bump
    # the version. Runs on PRs targeting main (compares against the base branch)
    # and on direct pushes to main (compares against the previous commit).
    - name: Require version bump on main
      if: >-
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' && github.base_ref == 'main')
      env:
        PUSH_BEFORE: ${{ github.event.before }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        NEW=$(jq -r .version package.json)
        if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          BEFORE="$PR_BASE_SHA"
        else
          BEFORE="$PUSH_BEFORE"
        fi
        if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
          echo "No base commit to compare against — skipping version check."
          exit 0
        fi
        OLD=$(git show "$BEFORE:package.json" 2>/dev/null | jq -r .version || echo "")
        echo "Base version: ${OLD:-<none>}  |  New version: $NEW"
        if [ "$OLD" = "$NEW" ]; then
          echo "::error::package.json version ($NEW) matches the base branch on main. Bump the version before merging/pushing."
          exit 1
        fi

    - uses: actions/setup-node@v4
      with:
        node-version: 23
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # ---------------------------------------------------------------------
    # Validation steps, ordered fastest-first so a cheap check fails the
    # pipeline before an expensive one runs. Any failure stops the pipeline.
    # ---------------------------------------------------------------------

    - name: Audit dependencies
      run: npm audit --audit-level=moderate

    - name: Typecheck
      run: npm run typecheck

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Test
      # Runs after Build: jasmine loads the compiled dist/**/materialize.{js,css}.
      run: npm run test

    # ---------------------------------------------------------------------
    # Release — only when a v* tag is pushed. Reaching here means every
    # validation step above passed.
    # ---------------------------------------------------------------------

    - name: Build release artifacts
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        npm run build -- --environment BUILD:release
        node compress.mjs

    - name: Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "$GITHUB_REF_NAME" \
          dist/materialize-v*.zip \
          dist/materialize-src-v*.zip \
          --title "$GITHUB_REF_NAME" \
          --generate-notes

    - name: Publish to npm
      if: startsWith(github.ref, 'refs/tags/v')
      # dist/ was just freshly built above, so skip the prepublishOnly rebuild.
      run: npm publish --ignore-scripts
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
